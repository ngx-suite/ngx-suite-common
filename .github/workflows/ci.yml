name: CI

on:
  push:
    branches:
      - main

# Cancel an in-progress run if a newer commit is pushed to the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# The GITHUB_TOKEN only needs to read the repo.
permissions:
  contents: read

env:
  NODE_VERSION: '22.22.3'
  HUSKY: '0' # Skip git-hook installation during `npm ci` in CI.

jobs:
  # 1. Install dependencies once and cache node_modules for the downstream jobs.
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache node_modules
        id: node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: npm ci
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

  # 2a. Lint — runs in parallel with `test`.
  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules
        id: node-modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: npm ci (cache miss fallback)
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run lint

  # 2b. Test — runs in parallel with `lint`.
  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules
        id: node-modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: npm ci (cache miss fallback)
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run test

  # 3. Build — only after both lint and test pass.
  build-lib:
    name: Build Library
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules
        id: node-modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: npm ci (cache miss fallback)
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run build-lib

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: dist-lib
          path: dist/
          if-no-files-found: error
          retention-days: 7

  # 3. Build — only after both lint and test pass.
  build:
    name: Build Demo App
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules
        id: node-modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: npm ci (cache miss fallback)
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: dist-demo
          path: dist/
          if-no-files-found: error
          retention-days: 7
